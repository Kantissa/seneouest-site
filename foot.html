<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOOT — Nos produits | Séné-Ouest SARL</title>
    <meta
      name="description"
      content="Découvrez la gamme FOOT : savon liquide, savon ménage en morceaux et détergent en poudre par Séné-Ouest SARL."
    />
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      [data-products-grid] .product-media {
        background: #eaf3fb;
        color: #1d6fb8;
      }
      [data-products-grid] .product-tag {
        background: #1d6fb8;
      }
    </style>
  </head>
  <body data-page="foot">
    <div id="site-header"></div>

    <main>
      <section class="brand-hero brand-hero--foot">
        <div class="container">
          <span class="brand-hero-badge"
            ><img src="img/brand-foot.png" alt="Logo FOOT"
          /></span>
          <h1>La gamme FOOT</h1>
          <p>
            Savon liquide, savon ménage en morceaux et détergent en poudre : un
            nettoyage puissant pour toute la famille.
          </p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <a href="nos-marques.html" class="back-link">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Retour à nos marques
          </a>

          <div
            class="section-header reveal"
            style="text-align: left; margin-bottom: 36px"
          >
            <span class="eyebrow">Catalogue</span>
            <h2 class="section-title">Produits FOOT</h2>
            <p class="section-subtitle mt-0">
              Contenu à titre d'exemple — à remplacer par le catalogue réel.
            </p>
          </div>

          <div class="products-grid" data-products-grid="foot"></div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/main.js"></script>
    <script src="js/products.js"></script>

</html>
